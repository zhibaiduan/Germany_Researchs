<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于研究 — SAP Research</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <div id="nav-mount"></div>

  <div class="page-layout">

    <aside class="global-sidebar" id="sidebar-mount"></aside>

    <div class="page-content">

      <div class="about-wrap">

        <div class="breadcrumb">
          <a href="index.html">首页</a>
          <span class="breadcrumb-sep">›</span>
          <span>关于研究</span>
        </div>

        <div class="about-section" style="margin-top: 36px;">
          <div class="about-label">研究初衷</div>
          <h2 class="about-title" id="about-subject-title"></h2>
          <div class="about-body" id="about-motivation"></div>
        </div>

        <hr class="about-divider">

        <div class="about-section">
          <div class="about-label">核心研究问题</div>
          <h2 class="about-title">我们试图回答什么</h2>
          <ul id="about-core-questions" style="font-family: var(--font-serif); font-size: 16px; line-height: 1.8; color: var(--text-2); padding-left: 20px; display: flex; flex-direction: column; gap: 8px;"></ul>
        </div>

        <hr class="about-divider">

        <div class="about-section" id="methodology">
          <div class="about-label">研究方法论</div>
          <h2 class="about-title">我们如何做研究</h2>
          <div class="about-body" id="about-methodology"></div>
        </div>

        <hr class="about-divider">

        <div class="about-section">
          <div class="about-label">研究者</div>
          <h2 class="about-title" id="about-researcher-name"></h2>
          <div class="about-body" id="about-researcher-bio"></div>
        </div>

        <hr class="about-divider">

        <div class="about-section">
          <div class="about-label">免责声明</div>
          <div class="about-body" style="font-size: 14px;" id="about-disclaimer"></div>
        </div>

      </div>

      <div id="footer-mount"></div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="assets/script.js"></script>
  <script>
    (async function () {
      await loadSiteContext();
      const lang = getActiveLang();
      document.getElementById('nav-mount').innerHTML = renderNav();
      document.getElementById('sidebar-mount').innerHTML = renderSidebar(lang);
      document.getElementById('footer-mount').innerHTML = renderFooter(lang);

      const cfg = RESEARCH_CONFIG;
      const r = cfg.researcher;
      const rl = loc(r, lang);
      const s = cfg.subject;
      const sl = loc(s, lang);
      const ui = UI[lang] || UI.zh;

      document.getElementById('about-subject-title').textContent =
        lang === 'zh' ? `为什么研究 ${s.name}` : `Why study ${s.name}`;
      document.getElementById('about-motivation').innerHTML =
        (sl.motivation || '').split('\n\n').map(p => `<p>${p}</p>`).join('');
      document.getElementById('about-core-questions').innerHTML =
        (sl.coreQuestions || []).map(q => `<li>${q}</li>`).join('');
      document.getElementById('about-methodology').innerHTML =
        `<p>${ui.overview} follows a reusable research-site schema: author identity, project positioning, topic index, article source content, and generated outputs are managed separately.</p>`;
      document.getElementById('about-researcher-name').textContent = r.name;
      document.getElementById('about-researcher-bio').innerHTML = `<p>${rl.intro || ''}</p>`;
      document.getElementById('about-disclaimer').innerHTML = `<p>${rl.disclaimer || ''}</p>`;
    })().catch(console.error);
  </script>
</body>
</html>
