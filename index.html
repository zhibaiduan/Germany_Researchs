<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP Research</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <div class="app-shell" id="app-shell">

    <!-- Left sidebar (persistent docs-style navigation) -->
    <aside class="left-sidebar" id="left-sidebar">
      <div class="left-sidebar-header">
        <a href="#/" class="left-sidebar-brand">Duan's Research</a>
        <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="收起侧边栏" aria-label="收起侧边栏">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div id="sidebar-mount"></div>
    </aside>

    <!-- Right content column -->
    <div class="app-content" id="app-content">
      <div id="nav-mount"></div>
      <div class="page-content" id="view"></div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="assets/script.js"></script>
  <script src="assets/router.js"></script>
</body>
</html>
